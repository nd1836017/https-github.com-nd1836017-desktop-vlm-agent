name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps for pyautogui + tesseract
        # Needed at runtime on Linux; tests use lazy imports but we install here
        # so `pip install pyautogui` works and a smoke `python -c "import agent"`
        # succeeds. tesseract-ocr is used by the CLICK_TEXT primitive.
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk scrot tesseract-ocr

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint
        run: ruff check .

      - name: Run tests
        # The agent module uses lazy imports for pyautogui, so the test suite
        # itself does not require a display server.
        run: pytest -q
